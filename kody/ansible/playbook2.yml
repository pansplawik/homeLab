---
- name: Manage Docker apps
  hosts: nginx
  become: true
  vars_files:
    - ../group_vars/all.yml
  vars:
    tls_dir: /etc/nginx/ssl/
    key_file: nginx.key
    cert_file: nginx.crt
    server_name: localhost
    conf_file: /etc/nginx/sites-available/default
    apps_root: /opt/apki
    service: ""   # nazwa serwisu do restartu, zostawi ^g puste = wszystkie
    build: false  # true = wymusza rebuild
  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
  tasks:
    - name: "Manage docker-compose.yml"
      template:
        src: "../templates/docker-compose.yml.j2"
        dest: "{{ apps_root }}/docker-compose.yml"
        mode: '0644'
    - name: "Start/rebuild Docker services"
      command: >
        docker compose
        up
        -d
        {% if build %} --build {% endif %}
        {% if service != "" %} {{ service }} {% endif %}
      args:        
        chdir: "{{ apps_root }}"
      notify: Restart nginx
    - name: Manage nginx config template
      template:
        src: "../templates/nginx.conf.j2"
        dest: "{{ conf_file }}"
        mode: '0644'
      notify: Restart nginx
    - name: Enable configuration
      file:
        src: /etc/nginx/sites-available/default
        dest: /etc/nginx/sites-enabled/default
        state: link
    - name: Test docker apps
      uri:
        url: "https://localhost/{{ item.name }}/"
        validate_certs: false
        status_code: 200
      loop: "{{ docker_apps }}"