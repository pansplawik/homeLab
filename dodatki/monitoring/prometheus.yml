global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['192.168.1.35:9090']
  - job_name: "cadvisor"
    static_configs:
      - targets:
        - "cadvisor:8080"
        - "192.168.1.37:8081"
        - "192.168.1.38:8080"
        - "srv48.mikr.us:40244"
  - job_name: "openvpn"
    static_configs:
      - targets:
        - "srv48.mikr.us:40225"
  - job_name: 'orthanc'
    scrape_interval: 10s
    metrics_path: /tools/metrics-prometheus
    basic_auth:
      username: orthanc
      password: orthanc
    static_configs:
      - targets: ['192.168.1.38:8042']
  - job_name: "nginx"
    static_configs:
      - targets:
          - "192.168.1.60:9113"